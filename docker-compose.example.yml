version: '3.8'

services:
  # Frontend service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  # Backend service (example - team backend sẽ thêm config của họ)
  # backend:
  #   image: your-backend-image:latest
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - DATABASE_URL=postgresql://user:password@db:5432/dbname
  #   depends_on:
  #     - db
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge
